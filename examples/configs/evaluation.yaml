stage: evaluation

source:
  prediction_manifest_path: /home/qptero/github/BenchRep/outputs/prediction/test_vae_20260622-161724/records/metadata/prediction_manifest.yaml
 # null = no manifest; embeddings_path must then be provided
  embeddings_path: null # null = infer from manifest; error if no manifest provided
  reconstructions_path: null # null = infer from manifest if available; skip reconstruction eval if unavailable

run:
  output_root: null # null = infer from manifest output dir if possible, else outputs/evaluation/
  run_name: null # null = let RunContext derive/generate the final run name

reductions:
  pca:
    enabled: true # true = force on; false = off; null = on
    params:
      n_components: null # auto = min(30, n_obs, n_vars)
      key_added: X_pca # explicit run_pca arg; obsm key for PCA coordinates
      random_state: 137 # explicit run_pca arg
      overwrite: false # explicit run_pca arg; true = replace existing obsm/provenance entry
      # Extra params here are passed to sklearn.decomposition.PCA

  umap:
    enabled: true # true = force on; false = off; null = on
    params:
      # common explicit run_umap params
      n_neighbors: 15 # explicit run_umap arg; null = omit param and use function/default behavior
      n_pcs: null # explicit run_umap arg; null = omit param and let Scanpy decide
      min_dist: 0.1 # explicit run_umap arg passed to scanpy.tl.umap
      metric: euclidean # explicit run_umap arg passed to scanpy.pp.neighbors
      key_added: X_umap # explicit run_umap arg; obsm key for UMAP coordinates
      neighbors_key: umap_neighbors # explicit run_umap arg; key used for Scanpy neighbor graph
      random_state: 137 # explicit run_umap arg
      overwrite: false # explicit run_umap arg; true = replace existing UMAP/neighbor keys

      # extra kwargs passed directly to scanpy.pp.neighbors
      # do not repeat explicit args here, e.g. n_neighbors, n_pcs, metric, key_added, or random_state
      neighbors_kwargs:
        method: umap

      # extra kwargs passed directly to scanpy.tl.umap
      # do not repeat explicit args here, e.g. min_dist, random_state, key_added, or neighbors_key
      umap_kwargs: {}

  tsne:
    enabled: true # true = force on; false = off; null = off
    params:
      n_pcs: null # explicit run_tsne arg; null = omit param and let Scanpy decide
      perplexity: 30 # explicit run_tsne arg; null = omit param and use function/default behavior
      key_added: X_tsne # explicit run_tsne arg; obsm key for t-SNE coordinates
      random_state: 137 # explicit run_tsne arg
      overwrite: false # explicit run_tsne arg; true = replace existing obsm/provenance entry
      # Extra params here are passed to scanpy.tl.tsne

clustering:
  kmeans:
    enabled: true # true = force on; false = off; null = off
    params:
      n_clusters: 10 # required if kmeans is explicitly enabled
      key_added: kmeans # explicit run_kmeans arg; obs column used for cluster labels
      random_state: 137 # explicit run_kmeans arg
      n_init: auto # explicit run_kmeans arg
      overwrite: false # explicit run_kmeans arg; true = replace existing cluster key
      # Extra params here are passed to sklearn.cluster.KMeans

  leiden:
    enabled: true # true = force on; false = off; null = on
    params:
      # common explicit run_leiden params
      resolution: 1.0 # explicit run_leiden arg; null = omit param and use function/default behavior
      n_neighbors: 15 # explicit run_leiden arg; null = omit param and use function/default behavior
      n_pcs: null # explicit run_leiden arg; null = omit param and let Scanpy decide
      metric: euclidean # explicit run_leiden arg passed to scanpy.pp.neighbors
      key_added: leiden # explicit run_leiden arg; obs column used for cluster labels
      neighbors_key: leiden_neighbors # explicit run_leiden arg; key used for Scanpy neighbor graph
      random_state: 137 # explicit run_leiden arg
      overwrite: false # explicit run_leiden arg; true = replace existing cluster/neighbor keys

      # extra kwargs passed directly to scanpy.pp.neighbors
      # do not repeat explicit args here, e.g. n_neighbors, n_pcs, metric, key_added, or random_state
      neighbors_kwargs:
        method: umap

      # extra kwargs passed directly to scanpy.tl.leiden
      # do not repeat explicit args here, e.g. resolution, random_state, key_added, or neighbors_key
      leiden_kwargs:
        directed: false

metrics:
  clustering:
    internal:
      enabled: true # true = force on; false = off; null = on
      selected: null # null = all supported internal clustering metrics
      params: null # null = metric/backend defaults

    external:
      enabled: null # true = force on; false = off; null = auto after checking adata.obs
      label_key: label # obs column used for labels; default is "label"
      selected: null # null = all supported external clustering metrics
      params: null # null = metric/backend defaults

  embedding:
    enabled: true # true = force on; false = off; null = off
    selected: null # null = all supported embedding metrics
    params: null # null = metric/backend defaults

  predictability:
    enabled: true
    selected: [ "svm_rbf" ] # [ "dummy", "linear", "knn", "random_forest", "xgboost", "svm_rbf" ]
    # omit = default probe set; must be a non-empty list if provided; null is invalid

    target_key: label # obs column to predict from adata.X
    task: classification # classification | regression

    cv:
      method: stratified_kfold # kfold | stratified_kfold | group_kfold | stratified_group_kfold
      n_splits: 5
      group_key: null # required for group_kfold / stratified_group_kfold; obs column defining groups
      shuffle: true # supported for kfold/stratified_kfold/stratified_group_kfold; must be false for group_kfold
      random_state: 137
      scoring: balanced_accuracy
      # null/omit = balanced_accuracy for classification, r2 for regression
      # classification: balanced_accuracy | f1_macro | f1_weighted | accuracy
      # regression: r2 | neg_mean_absolute_error | neg_root_mean_squared_error
    tuning:
      enabled: true # true = nested CV using list-valued probe params; false = all params must be scalar
      inner_cv:
        n_splits: 3

    params:
      dummy:
        strategy: most_frequent
        # classification: most_frequent | stratified | uniform
        # regression: mean | median

      linear:
        model: logistic_regression # classification default; for regression set to ridge
        standardize: true
        C: [ 0.01, 0.1, 1.0, 10.0 ] # logistic regression inverse regularization strength; list = tune
        class_weight: balanced # null or balanced
        max_iter: 5000

      knn:
        standardize: true
        n_neighbors: [ 5, 15, 30 ] # list = tune
        weights: [ "uniform", "distance" ]
        metric: euclidean # any sklearn-compatible kNN metric string; list = tune

      random_forest:
        n_estimators: 500 # list = tune
        max_depth: [ null, 10, 30 ] # null = unrestricted tree depth; list = tune
        class_weight: balanced # null or balanced
        random_state: 137
        n_jobs: -1 # passed to sklearn; -1 uses all available cores

      xgboost:
        n_estimators: 300
        max_depth: [ 3, 6 ]
        learning_rate: [ 0.03, 0.1 ]
        random_state: 137
        n_jobs: -1 # passed to xgboost; optional dependency

      svm_rbf:
        standardize: true
        C: [ 0.1, 1.0, 10.0 ] # inverse regularization strength; list = tune
        gamma: [ "scale", "auto" ] # RBF kernel width; list = tune
        class_weight: balanced # classification only; null or balanced
        cache_size: 5000 # MB used by sklearn's kernel cache
        max_iter: -1 # -1 = no iteration limit

  reconstruction:
    enabled: true # true = force on if reconstructions exist; false = off; null = on only if reconstructions exist
    selected: null # null = all supported reconstruction metrics
    params: null # null = metric/backend defaults
    reduction: per_channel # omit = global; allowed: global | per_channel | both

reconstruction:
  n_examples: 32 # omit/null = use manifest/exported count if available, else no explicit limit
  error_maps:
    enabled: true # true = force on if reconstructions exist; false = off; null = off
    params:
      # absolute | squared | signed | relative | normalized_absolute_global | normalized_absolute_per_channel;
      # omit = [ "absolute", "signed", "relative" ]
      kinds: [ "absolute", "squared", "signed", "relative",
              "normalized_absolute_global", "normalized_absolute_per_channel" ]
      denominator_floor: null # null/omit = default denominator floor for relative/normalized error maps

plots:
  enabled: true # true = force on; false = off; null = on
  params:
    color_accent: "#6A3D9A"
    color_by:
      - label # null = only default cluster/label colors if available, appended regardless
    dpi: 300 # omit = 300
    formats: [ png ] # supports png, pdf, svg; omit = png
